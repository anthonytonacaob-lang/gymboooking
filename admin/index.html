<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | SKILLS Gym Rental</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            blueStart: '#007bff',
                            blueEnd: '#00d2ff',
                            orangeStart: '#ff8c00',
                            orangeEnd: '#e65100',
                            formBlue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                sidebarOpen: false,
                currentView: 'calendar', // 'dashboard', 'calendar', or 'new-booking'
                
                // Calendar generation logic
                hours: [
                    '6:00 AM', '7:00 AM', '8:00 AM', '9:00 AM', '10:00 AM', 
                    '11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', 
                    '4:00 PM', '5:00 PM', '6:00 PM', '7:00 PM', '8:00 PM', 
                    '9:00 PM', '10:00 PM'
                ],
                
                getBookingData(hour, court) {
                    if (hour === '8:00 AM' && court === 'Court 2') return { booked: true, title: 'PE Training' };
                    if (hour === '5:00 PM' && court === 'Court 1') return { booked: true, title: 'Varsity Practice' };
                    if (hour === '6:00 PM' && court === 'Court 3') return { booked: true, title: 'Corporate Liga' };
                    return { booked: false };
                }
            }))
        })
    </script>
    
    <style>
        /* Custom input styles for the form */
        .form-input {
            @apply block w-full rounded-md border-0 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-blueStart sm:text-sm sm:leading-6 px-3;
        }
        .form-label {
            @apply block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1;
        }
    </style>
</head>
<body class="bg-[#f0f4f8] text-gray-800 font-sans antialiased" x-data="appData">

    <div class="flex h-screen overflow-hidden">

        <div x-show="sidebarOpen" class="fixed inset-0 z-20 bg-black bg-opacity-50 lg:hidden" @click="sidebarOpen = false"></div>

        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-30 w-64 bg-gradient-to-b from-primary-blueStart to-primary-blueEnd text-white transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
            <div class="flex items-center justify-center h-20 border-b border-white/20">
                <h1 class="text-2xl font-bold tracking-wider">SKILLS ADMIN</h1>
            </div>
            
            <nav class="p-4 space-y-2">
                <a href="#" @click.prevent="currentView = 'dashboard'; sidebarOpen = false" 
                   :class="currentView === 'dashboard' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" 
                   class="flex items-center px-4 py-3 rounded-lg transition-all">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Dashboard
                </a>

                <a href="#" @click.prevent="currentView = 'calendar'; sidebarOpen = false" 
                   :class="currentView === 'calendar' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" 
                   class="flex items-center px-4 py-3 rounded-lg transition-all">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Live Calendar
                </a>
                
                <a href="#" @click.prevent="currentView = 'new-booking'; sidebarOpen = false" 
                   :class="currentView === 'new-booking' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" 
                   class="flex items-center px-4 py-3 rounded-lg transition-all">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    New Booking
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <header class="bg-white shadow-sm h-20 flex items-center justify-between px-6 lg:px-10 z-10">
                <button @click="sidebarOpen = true" class="text-gray-500 focus:outline-none lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                
                <div class="hidden lg:block">
                    <h2 class="text-xl font-semibold text-gray-800" 
                        x-text="currentView === 'dashboard' ? 'Dashboard Overview' : (currentView === 'calendar' ? 'Live Facility Calendar' : 'Booking Management')">
                    </h2>
                </div>

                <div class="flex items-center space-x-6">
                    <div class="flex items-center space-x-3 cursor-pointer">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=007bff&color=fff" alt="Profile" class="w-10 h-10 rounded-full border-2 border-gray-200">
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 lg:p-10">
                
                <div x-show="currentView === 'dashboard'" style="display: none;" x-transition.opacity.duration.300ms>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                        <p class="text-gray-600">Welcome back. Here is what's happening today.</p>
                        <button @click="currentView = 'new-booking'" class="bg-gradient-to-r from-primary-orangeStart to-primary-orangeEnd hover:shadow-lg text-white px-6 py-2.5 rounded-lg font-medium shadow-md transition-all transform hover:-translate-y-0.5">
                            + New Booking Walk-in
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                            <p class="text-sm font-medium text-gray-500 mb-1">Total Bookings (Month)</p>
                            <h3 class="text-3xl font-bold text-gray-800">142</h3>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                            <p class="text-sm font-medium text-gray-500 mb-1">Pending Requests</p>
                            <h3 class="text-3xl font-bold text-gray-800">18</h3>
                        </div>
                    </div>
                </div>

                <div x-show="currentView === 'calendar'" style="display: none;" x-transition.opacity.duration.300ms class="flex flex-col h-full">
                    
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-gray-700">Today's Schedule</h3>
                        <div class="flex space-x-4 text-sm">
                            <div class="flex items-center"><span class="w-3 h-3 rounded bg-gray-100 border border-gray-300 mr-2"></span> Available</div>
                            <div class="flex items-center"><span class="w-3 h-3 rounded bg-gradient-to-r from-primary-blueStart to-primary-blueEnd mr-2"></span> Booked</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                        <div class="min-w-[700px]">
                            
                            <div class="grid grid-cols-[100px_1fr_1fr_1fr] bg-gray-50 border-b border-gray-200 sticky top-0 z-10">
                                <div class="p-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider border-r border-gray-200">Time</div>
                                <div class="p-4 text-center font-bold text-gray-800 border-r border-gray-200">Court 1</div>
                                <div class="p-4 text-center font-bold text-gray-800 border-r border-gray-200">Court 2</div>
                                <div class="p-4 text-center font-bold text-gray-800">Court 3</div>
                            </div>

                            <template x-for="hour in hours" :key="hour">
                                <div class="grid grid-cols-[100px_1fr_1fr_1fr] border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                                    
                                    <div class="p-4 text-xs font-medium text-gray-500 text-right border-r border-gray-200 flex items-center justify-end bg-gray-50/50" x-text="hour"></div>
                                    
                                    <template x-for="court in ['Court 1', 'Court 2', 'Court 3']" :key="court">
                                        <div class="p-2 border-r border-gray-100 last:border-r-0 h-20">
                                            
                                            <template x-if="getBookingData(hour, court).booked">
                                                <div class="h-full w-full rounded-md bg-gradient-to-r from-primary-blueStart to-primary-blueEnd text-white shadow flex flex-col items-center justify-center p-2 cursor-pointer transform transition-transform hover:-translate-y-0.5">
                                                    <span class="text-sm font-bold truncate w-full text-center" x-text="getBookingData(hour, court).title"></span>
                                                    <span class="text-xs opacity-80 mt-1">Confirmed</span>
                                                </div>
                                            </template>
                                            
                                            <template x-if="!getBookingData(hour, court).booked">
                                                <div class="h-full w-full rounded-md bg-gray-50 hover:bg-gray-100 border border-transparent hover:border-gray-200 transition-all cursor-pointer flex flex-col items-center justify-center text-gray-400 group-hover:bg-white" @click="currentView = 'new-booking'">
                                                    <span class="text-xs font-medium opacity-0 group-hover:opacity-100 transition-opacity text-primary-orangeStart">+ Block Slot</span>
                                                </div>
                                            </template>

                                        </div>
                                    </template>

                                </div>
                            </template>

                        </div>
                    </div>

                </div>

                <div x-show="currentView === 'new-booking'" style="display: none;" x-transition.opacity.duration.300ms class="max-w-4xl mx-auto">
                    
                    <h2 class="text-2xl font-bold text-[#0f2042] mb-6 tracking-tight">New Booking Entry</h2>
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 lg:p-8">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 mb-8">
                            <div>
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" placeholder="Enter complete name">
                            </div>
                            <div>
                                <label class="form-label">Organization Name</label>
                                <input type="text" class="form-input" placeholder="Enter organization (Optional)">
                            </div>
                            <div>
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-input" placeholder="Enter email to send receipt">
                            </div>
                            <div>
                                <label class="form-label">Home Address</label>
                                <input type="text" class="form-input" placeholder="Enter complete home address">
                            </div>
                            <div>
                                <label class="form-label">Type of ID</label>
                                <select class="form-input text-gray-700">
                                    <option>National ID</option>
                                    <option>Driver's License</option>
                                    <option>Passport</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label">ID Number</label>
                                <input type="text" class="form-input" placeholder="Enter ID number">
                            </div>
                        </div>

                        <div class="border-t border-gray-100 my-6"></div>

                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-5 mb-4 relative">
                            <button class="absolute top-4 right-4 text-xs font-bold text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors">
                                Remove Slot
                            </button>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-x-4 gap-y-5 mt-2">
                                <div>
                                    <label class="form-label">Date of Event</label>
                                    <input type="date" class="form-input text-gray-700" value="2026-05-27">
                                </div>
                                <div>
                                    <label class="form-label">Sport Type / Package</label>
                                    <select class="form-input text-gray-700">
                                        <option>Basketball</option>
                                        <option>Volleyball</option>
                                        <option>Badminton</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label text-transparent selection:text-transparent hidden md:block">Spacer</label>
                                    <select class="form-input text-gray-700 mt-0 md:-mt-6">
                                        <option disabled selected>Select Facility</option>
                                        <option>Court 1</option>
                                        <option>Court 2</option>
                                        <option>Court 3</option>
                                    </select>
                                </div>
                                
                                <div class="col-span-1 md:col-span-3">
                                    <label class="form-label">Remarks & Inclusions</label>
                                    <input type="text" class="form-input" placeholder="Regular Game (Max 20).">
                                </div>

                                <div class="col-span-1 md:col-span-1 border-r border-transparent md:border-r-gray-200 md:pr-4">
                                    <label class="form-label">Time Started</label>
                                    <select class="form-input text-gray-500">
                                        <option>Select start time...</option>
                                    </select>
                                </div>
                                <div class="col-span-1 md:col-span-2">
                                    <label class="form-label">Time Ended</label>
                                    <select class="form-input text-gray-500 w-full md:w-1/2">
                                        <option>Select end time...</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button class="w-full py-3 mb-8 bg-slate-100 hover:bg-slate-200 border border-slate-300 rounded-lg text-sm font-bold text-slate-600 transition-colors flex justify-center items-center">
                            + Add Another Booking Slot
                        </button>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label class="form-label">Total Hours (All Slots)</label>
                                <input type="text" class="form-input bg-gray-50" value="0" readonly>
                            </div>
                            <div>
                                <label class="form-label">Total Base Amount (All Slots)</label>
                                <input type="text" class="form-input bg-gray-50" value="0.00" readonly>
                            </div>
                        </div>

                        <div class="border-2 border-dashed border-gray-200 rounded-lg p-5 mb-8">
                            <label class="form-label mb-3">Additional Charges (Applied to entire transaction)</label>
                            <button class="px-4 py-2 bg-white border border-gray-300 rounded text-xs font-bold text-gray-600 shadow-sm hover:bg-gray-50">
                                + Add Charge/Remark
                            </button>
                        </div>

                        <div class="mb-6">
                            <label class="form-label">Grand Total Payable (PHP)</label>
                            <div class="bg-[#f0f7ff] border border-blue-200 rounded-lg p-4">
                                <span class="text-3xl font-black text-slate-800">0.00</span>
                            </div>
                        </div>

                        <div class="mb-8">
                            <label class="form-label">Mode of Payment</label>
                            <select class="form-input text-gray-700">
                                <option>Cash</option>
                                <option>GCash</option>
                                <option>Bank Transfer</option>
                            </select>
                        </div>

                        <button class="w-full bg-primary-formBlue hover:bg-blue-600 text-white font-bold py-4 rounded-lg shadow-sm transition-colors text-lg">
                            Save Complete Booking
                        </button>

                    </div>
                </div>

            </main>
        </div>
    </div>

</body>
</html>
