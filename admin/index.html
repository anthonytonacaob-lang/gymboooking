<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | SKILLS Gym Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: { blueStart: '#007bff', blueEnd: '#00d2ff', orangeStart: '#ff8c00', orangeEnd: '#e65100', formBlue: '#3b82f6' } } } }
        }
    </script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                sidebarOpen: false, currentView: 'dashboard', isLoading: false,
                currentDate: new Date().toISOString().split('T')[0],
                scriptURL: 'https://script.google.com/macros/s/AKfycbynGKeGSiFtANBec5JPg8qIq4IJ6TvVUpR6qFqzHTL0Q3ZAmJW5IYa9BQJFuMIvVJac5w/exec',
                bookingForm: { fullName: '', email: '', court: 'Court 1', date: new Date().toISOString().split('T')[0] },
                
                timeBlocks: [
                    { label: '6:00 AM - 7:00 AM', start: '06:00', end: '07:00' },
                    { label: '7:00 AM - 8:00 AM', start: '07:00', end: '08:00' },
                    { label: '8:00 AM - 9:00 AM', start: '08:00', end: '09:00' },
                    { label: '9:00 AM - 10:00 AM', start: '09:00', end: '10:00' }
                ],
                
                showToast() {
                    const toast = document.getElementById('toast');
                    toast.classList.remove('translate-y-20', 'opacity-0');
                    toast.classList.add('translate-y-0', 'opacity-100');
                    setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
                },

                async submitBooking() {
                    if(!this.bookingForm.fullName) { alert("Enter a Name"); return; }
                    this.isLoading = true;
                    try {
                        await fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(this.bookingForm) });
                        this.showToast();
                        this.bookingForm.fullName = ''; this.bookingForm.email = '';
                        this.currentView = 'dashboard';
                    } catch (e) { alert("Error connecting to sheet."); }
                    finally { this.isLoading = false; }
                },

                handleCellClick(court, block) {
                    this.bookingForm.court = court;
                    this.bookingForm.date = this.currentDate;
                    this.currentView = 'new-booking';
                }
            }))
        })
    </script>
</head>
<body class="bg-gray-100 font-sans" x-data="appData">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-gradient-to-b from-blue-700 to-blue-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-10">SKILLS ADMIN</h1>
            <nav class="space-y-4">
                <a href="#" @click="currentView='dashboard'" class="block p-3 rounded hover:bg-white/10">Dashboard</a>
                <a href="#" @click="currentView='calendar'" class="block p-3 rounded hover:bg-white/10">Live Calendar</a>
                <a href="#" @click="currentView='new-booking'" class="block p-3 rounded hover:bg-white/10">New Booking</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 relative">
            <div x-show="isLoading" class="absolute inset-0 z-50 bg-white/70 flex items-center justify-center font-bold">Processing...</div>

            <div x-show="currentView==='dashboard'">
                <h2 class="text-3xl font-bold text-gray-800">Dashboard</h2>
            </div>

            <div x-show="currentView==='calendar'" style="display:none">
                <h2 class="text-2xl font-bold mb-6">Live Facility Calendar</h2>
                <div class="bg-white rounded-lg shadow overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-left">
                                <th class="p-4 border">Time Block</th>
                                <th class="p-4 border">Court 1</th>
                                <th class="p-4 border">Court 2</th>
                                <th class="p-4 border">Court 3</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="block in timeBlocks" :key="block.start">
                                <tr class="hover:bg-gray-50 border-b">
                                    <td class="p-4 border text-sm font-semibold" x-text="block.label"></td>
                                    <template x-for="court in ['Court 1', 'Court 2', 'Court 3']">
                                        <td class="p-4 border cursor-pointer hover:bg-blue-50 text-blue-500 font-bold" 
                                            @click="handleCellClick(court, block)">+ Book</td>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="currentView==='new-booking'" style="display:none" class="max-w-xl">
                <h2 class="text-2xl font-bold mb-6">New Booking Entry</h2>
                <input x-model="bookingForm.fullName" placeholder="Full Name" class="border p-3 w-full mb-4 rounded">
                <input x-model="bookingForm.email" placeholder="Email" class="border p-3 w-full mb-4 rounded">
                <button @click="submitBooking()" class="bg-blue-600 text-white p-4 w-full rounded font-bold">Save Complete Booking</button>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white p-4 rounded shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">Booking Successfully</div>
</body>
</html>
