<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | SKILLS Gym Rental</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 
                            blueStart: '#007bff', 
                            blueEnd: '#00d2ff', 
                            orangeStart: '#ff8c00', 
                            orangeEnd: '#e65100', 
                            formBlue: '#3b82f6' 
                        }
                    }
                }
            }
        }
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                sidebarOpen: false,
                currentView: 'dashboard', 
                isLoading: false,
                currentDate: new Date().toISOString().split('T')[0],

                // Full Time Blocks with start/end strings for data attributes
                timeBlocks: [
                    { label: '6:00 AM - 7:00 AM', start: '06:00', end: '07:00', queryTime: '6:00 AM' },
                    { label: '7:00 AM - 8:00 AM', start: '07:00', end: '08:00', queryTime: '7:00 AM' },
                    { label: '8:00 AM - 9:00 AM', start: '08:00', end: '09:00', queryTime: '8:00 AM' },
                    { label: '9:00 AM - 10:00 AM', start: '09:00', end: '10:00', queryTime: '9:00 AM' },
                    { label: '10:00 AM - 11:00 AM', start: '10:00', end: '11:00', queryTime: '10:00 AM' },
                    { label: '11:00 AM - 12:00 PM', start: '11:00', end: '12:00', queryTime: '11:00 AM' },
                    { label: '12:00 PM - 1:00 PM', start: '12:00', end: '13:00', queryTime: '12:00 PM' },
                    { label: '1:00 PM - 2:00 PM', start: '13:00', end: '14:00', queryTime: '1:00 PM' },
                    { label: '2:00 PM - 3:00 PM', start: '14:00', end: '15:00', queryTime: '2:00 PM' },
                    { label: '3:00 PM - 4:00 PM', start: '15:00', end: '16:00', queryTime: '3:00 PM' },
                    { label: '4:00 PM - 5:00 PM', start: '16:00', end: '17:00', queryTime: '4:00 PM' },
                    { label: '5:00 PM - 6:00 PM', start: '17:00', end: '18:00', queryTime: '5:00 PM' },
                    { label: '6:00 PM - 7:00 PM', start: '18:00', end: '19:00', queryTime: '6:00 PM' },
                    { label: '7:00 PM - 8:00 PM', start: '19:00', end: '20:00', queryTime: '7:00 PM' },
                    { label: '8:00 PM - 9:00 PM', start: '20:00', end: '21:00', queryTime: '8:00 PM' },
                    { label: '9:00 PM - 10:00 PM', start: '21:00', end: '22:00', queryTime: '9:00 PM' }
                ],
                
                // Form State
                bookingForm: { fullName: '', email: '', court: 'Court 1', date: new Date().toISOString().split('T')[0] },
                
                // --- GOOGLE SHEETS WEB APP URL ---
                // Paste your specific Apps Script URL here!
                scriptURL: 'https://script.google.com/macros/s/AKfycbxpXafMPD75uGyHd2l9tux1Y_CjBmtuRUrk1OE51_z9NkQ5nMRfmIlXFzWaENJUR6Mt/exec',

                // Mock Data Logic for visualizing booked slots on the calendar
                getBookingData(block, court) {
                    const dateHash = this.currentDate.charCodeAt(this.currentDate.length - 1);
                    if (dateHash % 2 === 0) {
                        if (block.queryTime === '8:00 AM' && court === 'Court 2') return { booked: true, title: 'PE Training' };
                        if (block.queryTime === '5:00 PM' && court === 'Court 1') return { booked: true, title: 'Varsity Practice' };
                    } else {
                        if (block.queryTime === '9:00 AM' && court === 'Court 1') return { booked: true, title: 'Basketball Clinic' };
                    }
                    return { booked: false };
                },

                // Calendar Navigation
                changeDay(offset) {
                    this.isLoading = true;
                    let dateObj = new Date(this.currentDate);
                    dateObj.setDate(dateObj.getDate() + offset);
                    this.currentDate = dateObj.toISOString().split('T')[0];
                    setTimeout(() => { this.isLoading = false; }, 400);
                },

                fetchAvailabilityForDate(date) {
                    this.isLoading = true;
                    this.currentDate = date;
                    setTimeout(() => { this.isLoading = false; }, 400);
                },

                // Triggers when admin clicks an empty calendar slot
                handleCellClick(court, block) {
                    console.log(`Booking Intent: ${court} on ${this.currentDate} at ${block.start}`);
                    this.bookingForm.court = court;
                    this.bookingForm.date = this.currentDate;
                    this.currentView = 'new-booking';
                },

                // Modern Toast Animation
                showToast() {
                    const toast = document.getElementById('toast');
                    toast.classList.remove('translate-y-20', 'opacity-0');
                    toast.classList.add('translate-y-0', 'opacity-100');
                    setTimeout(() => { 
                        toast.classList.remove('translate-y-0', 'opacity-100'); 
                        toast.classList.add('translate-y-20', 'opacity-0'); 
                    }, 3000);
                },

                // Submits the data to Google Sheets
                async submitBooking() {
                    if(!this.bookingForm.fullName || !this.bookingForm.email) { 
                        alert("Please fill in both Full Name and Email."); 
                        return; 
                    }
                    
                    this.isLoading = true;
                    try {
                        // Using 'no-cors' mode because we are calling Google from GitHub Pages
                        await fetch(this.scriptURL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(this.bookingForm)
                        });
                        
                        this.showToast();
                        
                        // Clear the form fields
                        this.bookingForm.fullName = '';
                        this.bookingForm.email = '';
                        this.bookingForm.court = 'Court 1';
                        this.bookingForm.date = new Date().toISOString().split('T')[0];
                        
                        // Return to the dashboard
                        this.currentView = 'dashboard';
                    } catch (error) {
                        console.error(error);
                        alert("Failed to connect to the database. Please check your URL.");
                    } finally {
                        this.isLoading = false;
                    }
                }
            }))
        })
    </script>
    
    <style>
        .form-input { @apply block w-full rounded-md border-0 py-2.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-primary-blueStart sm:text-sm sm:leading-6 px-3; }
        .form-label { @apply block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1.5; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body class="bg-[#f0f4f8] text-gray-800 font-sans antialiased" x-data="appData">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-gradient-to-b from-primary-blueStart to-primary-blueEnd text-white flex flex-col z-20">
            <div class="flex items-center justify-center h-20 border-b border-white/20 shadow-sm">
                <h1 class="text-2xl font-bold tracking-wider">SKILLS ADMIN</h1>
            </div>
            <nav class="p-4 space-y-2">
                <a href="#" @click.prevent="currentView = 'dashboard'" :class="currentView === 'dashboard' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" class="flex items-center px-4 py-3 rounded-lg transition-all font-medium">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Dashboard
                </a>
                <a href="#" @click.prevent="currentView = 'calendar'" :class="currentView === 'calendar' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" class="flex items-center px-4 py-3 rounded-lg transition-all font-medium">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Live Calendar
                </a>
                <a href="#" @click.prevent="currentView = 'new-booking'" :class="currentView === 'new-booking' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'" class="flex items-center px-4 py-3 rounded-lg transition-all font-medium">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    New Booking
                </a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            
            <div x-show="isLoading" class="absolute inset-0 z-50 bg-white/70 backdrop-blur-[1px] flex flex-col items-center justify-center" style="display: none;">
                <svg class="animate-spin h-8 w-8 text-primary-orangeStart mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm font-bold text-gray-600 tracking-wide">Processing...</span>
            </div>

            <header class="bg-white shadow-sm h-20 flex items-center justify-between px-6 lg:px-10 z-10">
                <h2 class="text-xl font-semibold text-gray-800" x-text="currentView === 'dashboard' ? 'Dashboard Overview' : (currentView === 'calendar' ? 'Live Facility Calendar' : 'Booking Management')"></h2>
                <div class="flex items-center space-x-3 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=007bff&color=fff" alt="Profile" class="w-10 h-10 rounded-full border-2 border-gray-200">
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 lg:p-10">
                
                <div x-show="currentView === 'dashboard'" style="display: none;" x-transition.opacity.duration.300ms>
                    <div class="flex justify-between items-center mb-8">
                        <p class="text-gray-600">Welcome back. Here is what's happening today.</p>
                        <button @click="currentView = 'new-booking'" class="bg-gradient-to-r from-primary-orangeStart to-primary-orangeEnd text-white px-6 py-2.5 rounded-lg font-medium shadow-md transition-all transform hover:-translate-y-0.5">+ New Booking Walk-in</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                            <p class="text-sm font-medium text-gray-500 mb-1">Total Bookings</p>
                            <h3 class="text-3xl font-bold text-gray-800">142</h3>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                            <p class="text-sm font-medium text-gray-500 mb-1">Pending Requests</p>
                            <h3 class="text-3xl font-bold text-gray-800">18</h3>
                        </div>
                    </div>
                </div>

                <div x-show="currentView === 'calendar'" style="display: none;" x-transition.opacity.duration.300ms class="flex flex-col h-full max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4">
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                                <button @click="changeDay(-1)" class="px-3 py-2 text-gray-500 hover:bg-gray-50 border-r border-gray-200 focus:outline-none">&lt;</button>
                                <input type="date" x-model="currentDate" @change="fetchAvailabilityForDate($event.target.value)" class="border-none text-sm font-bold text-gray-700 px-4 py-2 text-center outline-none">
                                <button @click="changeDay(1)" class="px-3 py-2 text-gray-500 hover:bg-gray-50 border-l border-gray-200 focus:outline-none">&gt;</button>
                            </div>
                            <button @click="fetchAvailabilityForDate(new Date().toISOString().split('T')[0])" class="text-xs font-bold text-primary-blueStart hover:text-primary-blueEnd uppercase tracking-wider">Today</button>
                        </div>
                    </div>

                    <div class="relative bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <div class="min-w-[740px]">
                                <div class="grid grid-cols-[140px_1fr_1fr_1fr] bg-gray-50 border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                                    <div class="p-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider border-r border-gray-200">Time</div>
                                    <div class="p-4 text-center font-bold text-gray-800 border-r border-gray-200">Court 1</div>
                                    <div class="p-4 text-center font-bold text-gray-800 border-r border-gray-200">Court 2</div>
                                    <div class="p-4 text-center font-bold text-gray-800">Court 3</div>
                                </div>

                                <template x-for="block in timeBlocks" :key="block.start">
                                    <div class="grid grid-cols-[140px_1fr_1fr_1fr] border-b border-gray-100 hover:bg-gray-50 transition-colors group" :data-start-time="block.start" :data-end-time="block.end">
                                        <div class="p-4 text-[11px] font-medium text-gray-500 text-right border-r border-gray-200 flex items-center justify-end bg-gray-50/50" x-text="block.label"></div>
                                        
                                        <template x-for="court in ['Court 1', 'Court 2', 'Court 3']" :key="court">
                                            <div class="p-2 border-r border-gray-100 last:border-r-0 h-20 relative" :data-court="court">
                                                
                                                <template x-if="getBookingData(block, court).booked">
                                                    <div class="h-full w-full rounded-md bg-gradient-to-r from-primary-blueStart to-primary-blueEnd text-white shadow-sm flex flex-col items-center justify-center p-2 cursor-pointer transform transition-transform hover:-translate-y-0.5 hover:shadow-md">
                                                        <span class="text-sm font-bold truncate w-full text-center" x-text="getBookingData(block, court).title"></span>
                                                        <span class="text-[10px] opacity-80 mt-0.5 uppercase tracking-wider">Confirmed</span>
                                                    </div>
                                                </template>
                                                
                                                <template x-if="!getBookingData(block, court).booked">
                                                    <div class="h-full w-full rounded-md bg-transparent border border-transparent hover:border-gray-300 hover:bg-white transition-all cursor-pointer flex flex-col items-center justify-center text-gray-400 group-hover:bg-white" @click="handleCellClick(court, block)">
                                                        <span class="text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity text-primary-orangeStart">+ Block Slot</span>
                                                    </div>
                                                </template>

                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="currentView === 'new-booking'" style="display: none;" x-transition.opacity.duration.300ms class="max-w-4xl mx-auto">
                    <h2 class="text-2xl font-bold text-[#0f2042] mb-6 tracking-tight">New Booking Entry</h2>
                    
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 lg:p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 mb-8">
                            <div>
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" placeholder="Enter complete name" x-model="bookingForm.fullName">
                            </div>
                            <div>
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-input" placeholder="Enter email to send receipt" x-model="bookingForm.email">
                            </div>
                        </div>

                        <div class="border-t border-gray-100 my-6"></div>

                        <div class="bg-slate-50 border border-slate-200 rounded-lg p-5 mb-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                                <div>
                                    <label class="form-label">Date of Event</label>
                                    <input type="date" class="form-input text-gray-700" x-model="bookingForm.date">
                                </div>
                                <div>
                                    <label class="form-label">Facility</label>
                                    <select class="form-input text-gray-700" x-model="bookingForm.court">
                                        <option>Court 1</option>
                                        <option>Court 2</option>
                                        <option>Court 3</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button @click="submitBooking()" class="w-full bg-primary-formBlue hover:bg-blue-600 text-white font-bold py-4 rounded-lg shadow-sm transition-colors text-lg flex justify-center items-center">
                            Save Complete Booking
                        </button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 z-[100] transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-gradient-to-r from-primary-blueStart to-primary-blueEnd text-white px-6 py-4 rounded-lg shadow-xl flex items-center">
            <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="font-bold text-lg">Booking Saved Successfully!</span>
        </div>
    </div>

</body>
</html>
