<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | SKILLS Gym Rental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                sidebarOpen: false, 
                currentView: 'dashboard', 
                isLoading: false,
                currentDate: new Date().toISOString().split('T')[0],
                scriptURL: 'https://script.google.com/macros/s/AKfycbynGKeGSiFtANBec5JPg8qIq4IJ6TvVUpR6qFqzHTL0Q3ZAmJW5IYa9BQJFuMIvVJac5w/exec',
                bookingForm: { fullName: '', email: '', court: 'Court 1', date: new Date().toISOString().split('T')[0] },
                
                async submitBooking() {
                    if(!this.bookingForm.fullName) { alert("Enter a Name"); return; }
                    this.isLoading = true;
                    try {
                        await fetch(this.scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(this.bookingForm) });
                        this.bookingForm.fullName = ''; 
                        this.bookingForm.email = '';
                        this.currentView = 'dashboard';
                        alert("Booking Successfully");
                    } catch (e) { alert("Error connecting to sheet."); }
                    finally { this.isLoading = false; }
                }
            }))
        })
    </script>
</head>
<body class="bg-gray-100 h-screen overflow-hidden" x-data="appData">
    <div class="flex h-full">
        <aside class="w-64 bg-blue-600 text-white p-6 flex flex-col">
            <h1 class="text-xl font-bold mb-8">SKILLS ADMIN</h1>
            <nav class="space-y-4">
                <a href="#" @click="currentView='dashboard'" class="block p-3 bg-white/20 rounded">Dashboard</a>
                <a href="#" @click="currentView='calendar'" class="block p-3 hover:bg-white/10 rounded">Live Calendar</a>
                <a href="#" @click="currentView='new-booking'" class="block p-3 hover:bg-white/10 rounded">New Booking</a>
            </nav>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <div x-show="isLoading" class="fixed inset-0 bg-white/50 flex items-center justify-center z-50">Processing...</div>

            <div x-show="currentView === 'dashboard'">
                <h2 class="text-2xl font-bold mb-4">Dashboard Overview</h2>
                <p>Welcome back, Admin.</p>
            </div>

            <div x-show="currentView === 'calendar'">
                <h2 class="text-2xl font-bold mb-4">Live Facility Calendar</h2>
                <div class="bg-white p-6 rounded shadow">Calendar Grid will appear here.</div>
            </div>

            <div x-show="currentView === 'new-booking'">
                <h2 class="text-2xl font-bold mb-6">New Booking Entry</h2>
                <div class="bg-white p-8 rounded shadow max-w-2xl">
                    <input x-model="bookingForm.fullName" placeholder="Full Name" class="border p-3 w-full mb-4 rounded">
                    <input x-model="bookingForm.email" placeholder="Email Address" class="border p-3 w-full mb-4 rounded">
                    <button @click="submitBooking()" class="bg-blue-600 text-white p-3 w-full rounded font-bold hover:bg-blue-700">Save Complete Booking</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
